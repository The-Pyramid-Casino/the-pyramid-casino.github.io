<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Binding of Isaac Archive Embed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #1a1a1a; /* match casino dark theme */
      color: #f5e6c5;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .fullscreen-embed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      border-radius: 0;
      background: #222;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="fullscreen-embed">
    <iframe
      src="https://archive.org/embed/the-binding-of-isaac_202111"
      allowfullscreen
      webkitallowfullscreen="true"
      mozallowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
