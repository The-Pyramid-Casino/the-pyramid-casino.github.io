<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Binding of Isaac Archive Embed</title>
  <meta name="viewport" content="width=560, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Inherit website's base styles, then customize for embed */
    body {
      background: #1a1a1a; /* Likely casino dark theme */
      color: #f5e6c5;      /* Gold/yellow casino accent */
      font-family: 'Segoe UI', 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .embed-container {
      background: rgba(34, 34, 34, 0.95);
      border: 2px solid #d4af37; /* gold border */
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      padding: 32px 24px;
      max-width: 600px;
      margin: 32px auto;
      text-align: center;
    }
    .embed-title {
      font-size: 2rem;
      margin-bottom: 18px;
      font-weight: bold;
      color: #d4af37;
      text-shadow: 0 2px 8px #000;
    }
    iframe {
      display: block;
      margin: 0 auto 12px auto;
      border-radius: 6px;
      border: 2px solid #d4af37;
      box-shadow: 0 2px 12px rgba(0,0,0,0.6);
      background: #222;
      width: 100%;
      max-width: 560px;
      height: 384px;
    }
    .embed-desc {
      color: #f5e6c5;
      font-size: 1.1rem;
      margin-top: 12px;
    }
    @media (max-width: 700px) {
      .embed-container {
        padding: 16px 8px;
      }
      iframe {
        max-width: 100vw;
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="embed-container">
    <div class="embed-title">The Binding of Isaac (Archive.org)</div>
    <iframe src="https://archive.org/embed/the-binding-of-isaac_202111"
      width="560" height="384"
      frameborder="0"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allowfullscreen>
    </iframe>
    <div class="embed-desc">
      Play "The Binding of Isaac" directly in your browser, courtesy of Archive.org. Experience the classic game in an embedded format, styled to match The Pyramid Casino!
    </div>
  </div>
</body>
</html>
