<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Suggest a Game | Pyramid Casino</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    :root {
      --bg-main: #18122b;
      --bg-card: #231b36;
      --yellow: #f9d923;
      --yellow-light: #ffe277;
      --text-main: #f3e9dc;
      --accent: #a0843a;
      --danger: #d93025;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--accent);
      color: #fff;
      padding: 1rem 2rem;
    }
    .logo {
      font-weight: bold;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }
    .header nav ul {
      list-style: none;
      display: flex;
      gap: 1.2rem;
      margin: 0;
      padding: 0;
    }
    .header nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .header nav a:hover {
      color: #f3e9dc;
      text-shadow: 0 0 5px var(--yellow);
    }
    .main-content {
      padding: 2rem 1rem 3rem 1rem;
      min-height: 60vh;
      max-width: 470px;
      margin: 0 auto;
    }
    .suggest-title {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 1.4rem;
      color: var(--yellow);
      letter-spacing: 1px;
    }
    .form-card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 4px 12px #0005;
      padding: 2.2rem 1.3rem 2rem 1.3rem;
      margin-top: 2.2rem;
    }
    .form-group {
      margin-bottom: 1.4em;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--yellow-light);
      font-size: 1.08em;
    }
    .required {
      color: var(--danger);
      margin-left: 2px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 6px;
      border: 2px solid var(--accent);
      font-size: 1em;
      background: #f3e9dc;
      color: #18122b;
      margin-top: 2px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--yellow); background: #fffbe7; outline: none; }
    textarea { min-height: 60px; resize: vertical; }
    .radio-group {
      display: grid;
      grid-template-columns: min-content 1fr;
      grid-gap: 1em 0.7em;
      align-items: center;
      margin-top: 8px;
      margin-bottom: 0.5em;
    }
    .radio-group label {
      color: var(--text-main);
      font-weight: normal;
      font-size: 1em;
      margin-bottom: 0;
      display: flex;
      align-items: center;
    }
    .radio-group input[type="radio"] {
      accent-color: var(--yellow);
      margin-right: 8px;
      margin-left: 0;
    }
    .radio-group .consent-option-other {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    .radio-group input[type="text"] {
      width: 160px;
      margin: 0;
      padding: 7px 9px;
      font-size: 1em;
      border-radius: 6px;
      border: 2px solid var(--accent);
      background: #f3e9dc;
      color: #18122b;
      transition: border-color 0.2s;
    }
    .radio-group input[type="text"]:focus {
      border-color: var(--yellow);
      background: #fffbe7;
    }
    .radio-label-right {
      margin-left: 13px;
    }
    .checkbox-group {
      margin: 1.2em 0 0.7em 0;
      display: flex;
      align-items: center;
    }
    .checkbox-group input[type="checkbox"] {
      accent-color: var(--yellow);
      width: 18px;
      height: 18px;
      margin-right: 9px;
      margin-left: 2px;
    }
    .checkbox-group label {
      color: var(--yellow-light);
      font-weight: 600;
      font-size: 1em;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 2em;
      margin-bottom: 0.4em;
    }
    button {
      background: var(--yellow);
      color: #18122b;
      border: none;
      border-radius: 10px;
      font-size: 1.18em;
      font-weight: bold;
      padding: 0.7em 2.3em;
      cursor: pointer;
      transition: background 0.18s;
      box-shadow: 0 2px 6px #0002;
    }
    button[type="reset"] {
      background: var(--yellow-light);
      color: #231b36;
    }
    button:hover {
      background: var(--yellow-light);
      color: #18122b;
    }
    .note {
      font-size: 0.97em;
      color: var(--yellow-light);
      margin-top: 1.3em;
      text-align: center;
    }
    .footer {
      margin-top: 3rem;
    }
    @media (max-width: 700px) {
      .main-content {
        padding: 1rem 0.5rem 2.5rem 0.5rem;
      }
      .form-card {
        padding: 1.2rem 0.6rem 1.2rem 0.6rem;
      }
    }
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V9DHVKBD85"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());

  gtag("config", "G-V9DHVKBD85");
</script>
</head>
<body>
  <header class="header">
    <div class="logo">
      <span role="img" aria-label="pyramid">🏜️</span> Pyramid Casino
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#games">Games</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="suggest.html" style="color:#f9d923;text-shadow:0 0 5px #ffe277;">Suggest</a></li>
      </ul>
    </nav>
  </header>
  <main class="main-content">
    <div class="suggest-title">Suggest a New Game</div>
    <div class="form-card">
      <form id="casinoForm"
            action="https://docs.google.com/forms/d/e/1FAIpQLSfTJkN0HeW6SJk3PHHxKweeEIPjIA2htRDvOQYKnaVk5moBBA/formResponse"
            method="POST"
            target="hidden_iframe"
            onsubmit="return submitGoogleForm();">
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="entry.1577032836" required placeholder="Your email" />
        </div>
        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input type="text" id="name" name="entry.1630449069" required placeholder="Your name" />
        </div>
        <div class="form-group">
          <label for="game">What Game Are You Requesting? <span class="required">*</span></label>
          <input type="text" id="game" name="entry.213076971" required placeholder="Game name" />
        </div>
        <div class="form-group">
          <label for="description">Can you describe the game? <span class="required">*</span></label>
          <textarea id="description" name="entry.1955774044" required placeholder="Describe the game..."></textarea>
        </div>
        <div class="form-group">
          <label>
            Do you consent to this information being used to improve the pyramid casino?
            <span class="required">*</span>
          </label>
          <div class="radio-group">
            <input type="radio" id="consent-yes" name="entry.1517038171" value="Yes" required>
            <span class="radio-label-right">Yes</span>
            <input type="radio" id="consent-no" name="entry.1517038171" value="No" required>
            <span class="radio-label-right">No</span>
            <div class="consent-option-other">
              <input type="radio" id="consent-other" name="entry.1517038171" value="Other" required>
              <label for="consent-other" style="margin:0;">Other:</label>
              <input type="text" name="entry.1517038171.other_option_response" placeholder="Other response" />
            </div>
          </div>
        </div>
        <!-- If you want "Send me a copy" to actually do something, you need a Google Form field for it.
             Here's a sample checkbox, but you may need to adjust the name to match your form setup. -->
        <div class="checkbox-group">
          <input type="checkbox" id="copy" name="entry.1659679688">
          <label for="copy">Send me a copy of my responses.</label>
        </div>
        <div class="actions">
          <button type="reset">Clear</button>
          <button type="submit">Submit</button>
        </div>
        <div class="note">* Indicates required question</div>
        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
      </form>
      <div id="thanksMessage" style="display:none;color:var(--yellow);text-align:center;font-weight:bold;font-size:1.2em;margin-top:1em;">
        Thank you for your suggestion!
      </div>
    </div>
  </main>
  <footer class="footer">
    Pyramid Casino &copy; <span id="year"></span>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // "Other" consent logic
    const radios = document.querySelectorAll('input[name="entry.1517038171"]');
    const consentOther = document.querySelector('input[name="entry.1517038171.other_option_response"]');
    function updateOther() {
      consentOther.disabled = !document.getElementById('consent-other').checked;
      if (consentOther.disabled) consentOther.value = '';
    }
    radios.forEach(r => r.addEventListener('change', updateOther));
    updateOther();

    // Show thank you message after submit
    function submitGoogleForm() {
      document.getElementById('casinoForm').style.display = "none";
      document.getElementById('thanksMessage').style.display = "block";
      return true;
    }
  </script>
</body>
</html>
