<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Suggest a Game | Pyramid Casino</title>
  <meta name="description" content="Suggest new games to Pyramid Casino! We value your ideas for making our Ancient Egypt-themed online casino even more fun." />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #18122b;
      color: #f3e9dc;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #a0843a;
      color: #fff;
      padding: 1rem 2rem;
    }
    .logo {
      font-weight: bold;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }
    .header nav ul {
      list-style: none;
      display: flex;
      gap: 1.2rem;
      margin: 0;
      padding: 0;
    }
    .header nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .header nav a:hover {
      color: #f3e9dc;
      text-shadow: 0 0 5px #f9d923;
    }
    .main-content {
      padding: 2rem 1rem 3rem 1rem;
      min-height: 60vh;
      max-width: 460px;
      margin: 0 auto;
    }
    .suggest-title {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 1.4rem;
      color: #f9d923;
      letter-spacing: 1px;
    }
    .form-card {
      background: #231b36;
      border-radius: 16px;
      box-shadow: 0 4px 12px #0005;
      padding: 2.2rem 1.3rem 2rem 1.3rem;
      margin-top: 2.2rem;
    }
    .form-group {
      margin-bottom: 1.3em;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ffe277;
      font-size: 1.08em;
    }
    .required {
      color: #d93025;
      margin-left: 2px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 6px;
      border: 1.5px solid #a0843a;
      font-size: 1em;
      background: #f3e9dc;
      color: #18122b;
      margin-top: 2px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #f9d923; background: #fffbe7; outline: none; }
    textarea { min-height: 60px; resize: vertical; }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 8px;
      color: #f3e9dc;
    }
    .radio-group label {
      color: #f3e9dc;
      font-weight: normal;
      font-size: 1em;
      display: flex;
      align-items: center;
    }
    .radio-group input[type="radio"] {
      accent-color: #f9d923;
      margin-right: 7px;
    }
    .radio-group input[type="text"] {
      width: 170px;
      margin-left: 10px;
      margin-top: 0;
      padding: 7px 9px;
      font-size: 1em;
    }
    .checkbox-group {
      margin: 1.2em 0 0.7em 0;
      display: flex;
      align-items: center;
    }
    .checkbox-group label {
      color: #ffe277;
      font-weight: 500;
      margin-left: 7px;
      font-size: 1em;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 1.8em;
    }
    button {
      background: #f9d923;
      color: #18122b;
      border: none;
      border-radius: 8px;
      font-size: 1.08em;
      font-weight: bold;
      padding: 0.7em 2.1em;
      cursor: pointer;
      transition: background 0.18s;
      box-shadow: 0 2px 6px #0002;
    }
    button[type="reset"] {
      background: #ffe277;
      color: #231b36;
    }
    button:hover {
      background: #ffe277;
      color: #18122b;
    }
    .note {
      font-size: 0.97em;
      color: #ffe277;
      margin-top: 1.3em;
      text-align: center;
    }
    .footer {
      background: #231b36;
      color: #f9d923;
      text-align: center;
      padding: 1rem 0;
      position: fixed;
      left: 0; right: 0; bottom: 0;
      width: 100vw;
      font-size: 1rem;
    }
    @media (max-width: 700px) {
      .main-content {
        padding: 1rem 0.5rem 2.5rem 0.5rem;
      }
      .form-card {
        padding: 1.2rem 0.6rem 1.2rem 0.6rem;
      }
    }
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V9DHVKBD85"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());

  gtag("config", "G-V9DHVKBD85");
</script>
</head>
<body>
  <header class="header">
    <div class="logo">
      <span role="img" aria-label="pyramid">🏜️</span> Pyramid Casino
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#games">Games</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="suggest.html" style="color:#f9d923;text-shadow:0 0 5px #ffe277;">Suggest</a></li>
      </ul>
    </nav>
  </header>
  <main class="main-content">
    <div class="suggest-title">Suggest a New Game</div>
    <div class="form-card">
      <form id="casinoForm" autocomplete="off">
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required placeholder="Your email" />
        </div>
        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" required placeholder="Your name" />
        </div>
        <div class="form-group">
          <label for="game">What Game Are You Requesting? <span class="required">*</span></label>
          <input type="text" id="game" name="game" required placeholder="Game name" />
        </div>
        <div class="form-group">
          <label for="description">Can you describe the game? <span class="required">*</span></label>
          <textarea id="description" name="description" required placeholder="Describe the game..."></textarea>
        </div>
        <div class="form-group">
          <label>Do you consent to this information being used to improve the pyramid casino? <span class="required">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="consent" value="Yes" required> Yes</label>
            <label><input type="radio" name="consent" value="No" required> No</label>
            <label>
              <input type="radio" name="consent" value="Other" required>
              Other:
              <input type="text" name="consent_other" placeholder="Other response" />
            </label>
          </div>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="copy" name="copy">
          <label for="copy">Send me a copy of my responses.</label>
        </div>
        <div class="actions">
          <button type="reset">Clear</button>
          <button type="submit">Submit</button>
        </div>
        <div class="note">* Indicates required question</div>
      </form>
    </div>
  </main>
  <footer class="footer">
    Pyramid Casino &copy; <span id="year"></span>
  </footer>
  <script>
    // Set year in footer
    document.getElementById('year').textContent = new Date().getFullYear();

    // Disable "Other" input unless selected
    const radios = document.querySelectorAll('input[name="consent"]');
    const consentOther = document.querySelector('input[name="consent_other"]');
    function updateOther() {
      consentOther.disabled = !document.querySelector('input[name="consent"][value="Other"]').checked;
      if (consentOther.disabled) consentOther.value = '';
    }
    radios.forEach(r => r.addEventListener('change', updateOther));
    updateOther();

    // Demo form submit
    document.getElementById('casinoForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Thank you for your suggestion! (This is a demo form. Add backend/email logic for real submissions.)');
      this.reset();
      updateOther();
    });
  </script>
</body>
</html>
